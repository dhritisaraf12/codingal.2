<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                background-color: lightgray;
                background-image: linear-gradient(to bottom, lightbllue, lightgray);
                background-repeat: no-repeat;
                background-size: cover;
            }

            .page-header {
                text-align: center;
                color: black;
                border-radius: 16px;
                background-image: linear-gradient(to right, yellow, lightyellow); 
            }

            .fact-card{
                background-color: lightblue;
                border-radius: 16px;
                color: black;
            }

            .fact-card h2 {
                color: dimgray;
            }

            .star {
                width: 60px;
                height: 60px;
                background-color: yellow;
                border-radius: 50%;
                shape-outside: circle;
                animation: twinkle 2s infinite alternate;
            }

            @keyframes twinkle {
                from { background-color: white; }
                to { background-color: yellow; }
            }

            footer-text {
                text-align: center;
                color: black;
 }

  </style>

    </head>
    <body>

    <div class = "page-header">
        <h1>My Space Page</h1>
        <p>Welcome to my corner of the galaxy!</p>
    </div>
     <div class = "fact-card">
        <h2>Fun Space Fact</h2>
        <p>The sun is so big that one million Earths can fit inside it.</p>
     </div>

     <div class ="star"></div>

     <p class="footer-text">Made by</p>
     </body>
</html>
