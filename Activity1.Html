<!DOCTYPE html>

<html>

<head>

<title>My Animal Fact File</title>
<style>
    body {
        background-color: lightgreen;
        font-family: Arial, Sans-serif;
    }
    .fact-file {
        background-color: yellow;
        color: black;
        width: 260px;
        padding:25px;
        border: 4px solid forestgreen;
        margin: 30px;
    }
    .animal-name {
        color: forestgreen;
        font-size: 22px;
    }
    .detail {
        color: black;
    }
    .cool-fact {
        color: darkorange;
        font-style: italic;
    }

    </style>

</head>

<body>

<div class="fact-file">

<h2 class="animal-name">Snow Leopard</h2>

<p class="detail">Type: Big Cat</p>

<p class="detail">Lives in: Mountain ranges of Central Asia</p>

<p class="detail">Diet: Deer, goats, and wild sheep</p>

<p class="cool-fact">Cool Fact: Can leap up to 15 metres in one jump!</p>

</div>

</body>

</html>
