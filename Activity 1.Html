<!DOCTYPE html>
<html>
    <head>
        <title>My Superhero Card</title>
    <style>
        body {
            background-color: darkblue;
            color: white;
            font-family: arial, sans-serif;
      }
  
      .hero-name {
        font-size: 60px;
        font-size: bold;
        color: yellow;
        text-shadow: 3px 3px orange;
      }

      .tagline {
        font-size: italic;
        color: lightblue;
        text-transform: capitalize;
      }

      label {
        text-transform: uppercase;
        text-decoration: underline;
        color: coral;
      }

      .power {
        font-weight: bold;
        color: lightgreen;
      }

      .weakness {
        text-decoration: line-through;
        color: gray;
      }

      .badge {
        font-size: 28px;
        font-weight: bold;
        color: gold;
        transform: rotate(15deg);
      }

      .made-by {
        color: coral;
        font-style: italic;
      }

      </style>
      </head>
      <body>
        <h1 class="hero-name">Thunder Kid</h1>
        <p class="tagline">the most powerfull hero in the school.</p>

        <h2 class="label">Superpowers</h2>
        <p class="power">Can run faster then a cheetah.</p>
        <p class="power">Can lift a school bus.</p>
       
        <h2 class="label">Weaknesses</h2>
        <p class="weakness">Maths homework</p>
        <p class="weakness">Broccoli</p>

        <p class="badge">Top Hero</p>

        <p class="made-by">Created by Dhriti</p>
      </body>
    </html>
</html>
